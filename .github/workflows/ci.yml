name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        env:
          # Dummy secrets for build (NextAuth requires these)
          AUTH_SECRET: ci-dummy-secret-32chars-minimum!!
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
